<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倉儲部AI語音宣讀系統</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 40px 60px; color: #1e293b; position: relative; }
        .header-panel { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .global-controls { display: flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 8px 15px; border-radius: 4px; border: 1px solid #e2e8f0; }
        .select-layout { padding: 4px 8px; font-size: 14px; border-radius: 4px; border: 1px solid #cbd5e1; background-color: #ffffff; color: #334155; max-width: 220px; }

        /* 全域播放主控列：讓主持人可一鍵從頭連續播放 / 暫停 / 停止 */
        .master-controls { display: flex; align-items: center; gap: 8px; background: #0f172a; padding: 8px 15px; border-radius: 4px; }
        .btn-master { background: #1e293b; color: #ffffff; border: 1px solid #334155; padding: 6px 14px; font-size: 14px; font-weight: 500; border-radius: 4px; cursor: pointer; transition: background 0.15s; }
        .btn-master:hover { background: #334155; }
        .btn-master.primary { background: #0284c7; border-color: #0284c7; }
        .btn-master.primary:hover { background: #0369a1; }

        .content-area { max-width: 1200px; margin-top: 20px; }
        .paragraph-block { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 35px; }
        .para-controls { display: flex; gap: 5px; padding-top: 5px; flex-shrink: 0; }

        .btn-icon { width: 32px; height: 32px; border-radius: 50%; border: none; background: #0f172a; color: #ffffff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; padding: 0; transition: background 0.2s; }
        .btn-icon:hover { background: #334155; }
        .btn-icon.active { background: #0284c7; }

        /* 中文斷行改用 normal + break-word，避免 break-all 把詞硬切在不該斷的地方 */
        .para-text { font-size: 24px; line-height: 1.8; color: #27272a; letter-spacing: 0.5px; word-break: normal; overflow-wrap: break-word; width: 100%; }
        .sentence { padding: 2px 4px; border-radius: 3px; transition: background-color 0.1s; cursor: pointer; }
        .current-highlight { background-color: #bae6fd !important; color: #0c4a6e !important; font-weight: 600; }

        .status-message { font-size: 18px; color: #64748b; padding: 40px 0; }
        .status-message.error { color: #b91c1c; }

        .right-sidebar { position: fixed; right: 20px; top: 150px; width: 35px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 4px; padding: 15px 5px; text-align: center; cursor: pointer; user-select: none; }
        .right-sidebar.active { background: #0f172a; color: #ffffff; border-color: #0f172a; }
        .sidebar-text { font-size: 14px; font-weight: 600; writing-mode: vertical-lr; text-orientation: upright; letter-spacing: 4px; }

        @media (max-width: 600px) {
            body { padding: 20px 16px; }
            .para-text { font-size: 19px; }
            .header-panel { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="header-panel">
    <div class="master-controls">
        <button id="masterPlayBtn" class="btn-master primary" onclick="toggleMasterPlay()">▶ 全部播放</button>
        <button class="btn-master" onclick="stopAll()">■ 停止</button>
    </div>
    <div class="global-controls">
        <span style="font-size: 14px; font-weight: 500; color: #475569;">語音：</span>
        <select id="voiceSelect" class="select-layout" onchange="onVoiceChange()">
            <option value="">載入中...</option>
        </select>
    </div>
    <div class="global-controls">
        <span style="font-size: 14px; font-weight: 500; color: #475569;">語速：</span>
        <select id="speedSelect" class="select-layout" onchange="updateSpeed()">
            <option value="0.75">0.75 倍速 (慢)</option>
            <option value="0.9">0.9 倍速</option>
            <option value="1" selected>1.0 倍速 (標準)</option>
            <option value="1.25">1.25 倍速</option>
            <option value="1.5">1.5 倍速 (快)</option>
        </select>
    </div>
</div>

<div id="contentArea" class="content-area"><div class="status-message">資料載入中...</div></div>

<div id="scrollToggle" class="right-sidebar active" onclick="toggleAutoScroll()">
    <div class="sidebar-text">自動捲軸開啟</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const meetingId = urlParams.get('id');
const synth = window.speechSynthesis;

// 每一段 paragraphs[i] 結構：
// {
//   displaySentences: [...],  // 畫面顯示用（原始字面），依標點切成一句一句
//   speechSentences: [...],   // 朗讀用（破音字已替換），與 displaySentences 一一對應
//   groups: [{ start, end }], // 把連續的分句合併成「整句」再朗讀，讓語氣更連貫
//   sentenceEls: [...]        // 對應的 DOM span
// }
let paragraphs = [];
let currentParaIdx = -1;
let isSpeaking = false;
let autoScroll = true;
let availableVoices = [];

// onboundary 在部分中文語音（尤其線上語音）不會觸發，導致高亮不動。
// 這個計時器做 fallback：若一段時間沒有 boundary 事件，就依字數估算時間自動推進高亮。
let fallbackTimer = null;

const DELIMS = ['，', '。', '！', '？', '、', '；', '：'];
const ENDERS = ['。', '！', '？'];
const MAX_UTTER_CHARS = 120; // 單一 utterance 字數上限，避免無標點長段落被引擎截斷

// 把一段文字依標點切成一句一句（標點會保留在該句尾端，不會被拿掉）。
// 另外對「過長且無標點」的片段做強制分段，避免語音引擎截斷。
function splitSentences(str) {
    const rough = str.split(/([，。！？、；：])/).reduce((acc, current) => {
        if (acc.length === 0 || DELIMS.includes(current)) {
            if (acc.length > 0) acc[acc.length - 1] += current;
            else acc.push(current);
        } else {
            if (current.trim()) acc.push(current);
        }
        return acc;
    }, []);

    const result = [];
    for (const s of rough) {
        if (s.length <= MAX_UTTER_CHARS) {
            result.push(s);
        } else {
            for (let i = 0; i < s.length; i += MAX_UTTER_CHARS) {
                result.push(s.slice(i, i + MAX_UTTER_CHARS));
            }
        }
    }
    return result;
}

// 把分句依「句尾標點（。！？）」分組，同一組會合併成一個 utterance 一起朗讀，
// 這樣句子中間的逗號停頓交給語音引擎自己判斷，聽起來會比逐句硬切自然許多
function groupSentences(sentences) {
    const groups = [];
    let start = 0;
    for (let i = 0; i < sentences.length; i++) {
        const s = sentences[i];
        const isEnder = ENDERS.some(e => s.endsWith(e));
        if (isEnder || i === sentences.length - 1) {
            groups.push({ start, end: i });
            start = i + 1;
        }
    }
    return groups;
}

// --- 語音清單處理：列出所有 zh-TW 語音供選，預設優先曉臻 ---
function populateVoices() {
    availableVoices = synth.getVoices().filter(v => /zh(-|_)?(TW|Hant)?/i.test(v.lang) || v.lang.toLowerCase().startsWith('zh'));
    if (availableVoices.length === 0) availableVoices = synth.getVoices(); // 極端情況：完全沒有中文語音時退回全部

    const sel = document.getElementById('voiceSelect');
    sel.innerHTML = '';

    if (availableVoices.length === 0) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.text = '（此瀏覽器無可用語音）';
        sel.appendChild(opt);
        return;
    }

    // 找出預設：優先曉臻，其次任何 zh-TW
    let defaultIndex = availableVoices.findIndex(v => v.name.includes('Microsoft HsiaoChen Online') || v.name.includes('曉臻'));
    if (defaultIndex === -1) defaultIndex = availableVoices.findIndex(v => /zh(-|_)?TW/i.test(v.lang));
    if (defaultIndex === -1) defaultIndex = 0;

    availableVoices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.text = `${v.name} (${v.lang})`;
        if (i === defaultIndex) opt.selected = true;
        sel.appendChild(opt);
    });
}

function getSelectedVoice() {
    const idx = parseInt(document.getElementById('voiceSelect').value, 10);
    return (!isNaN(idx) && availableVoices[idx]) ? availableVoices[idx] : null;
}

function onVoiceChange() {
    // 換語音時，如果正在播放則從目前段落重新開始（無法中途換音色）
    if (isSpeaking && currentParaIdx !== -1) {
        const pIdx = currentParaIdx;
        synth.cancel();
        playFromSentence(pIdx, 0);
    }
}

async function loadMeetingData() {
    const contentArea = document.getElementById('contentArea');
    if (!meetingId) {
        contentArea.innerHTML = '<div class="status-message error">網址缺少檔案代碼，無法載入內容。</div>';
        return;
    }
    try {
        const response = await fetch(`/api/meeting/${meetingId}`);
        const data = await response.json();

        // 明確處理找不到 / 已過期的情況，給友善提示
        if (!response.ok || !data.success) {
            contentArea.innerHTML = `<div class="status-message error">${data.message || '找不到該檔案或已過期。'}</div>`;
            return;
        }

        const rawDisplayParagraphs = data.text.split('\n').filter(p => p.trim());
        const rawSpeechParagraphs = (data.speechText || data.text).split('\n').filter(p => p.trim());

        contentArea.innerHTML = "";

        paragraphs = rawDisplayParagraphs.map((paraText, pIdx) => {
            const displaySentences = splitSentences(paraText);
            let speechSentences = splitSentences(rawSpeechParagraphs[pIdx] || paraText);

            // 安全防護：若因替換內容特殊導致分句數量對不齊，退回用顯示文字朗讀，避免對應錯亂
            if (speechSentences.length !== displaySentences.length) {
                speechSentences = displaySentences;
            }

            const groups = groupSentences(displaySentences);

            const block = document.createElement('div');
            block.className = 'paragraph-block';
            block.id = `block-${pIdx}`;

            const controls = document.createElement('div');
            controls.className = 'para-controls';

            const playBtn = document.createElement('button');
            playBtn.className = 'btn-icon';
            playBtn.id = `play-btn-${pIdx}`;
            playBtn.innerHTML = '▶';
            playBtn.onclick = () => toggleParagraph(pIdx);

            const resetBtn = document.createElement('button');
            resetBtn.className = 'btn-icon';
            resetBtn.innerHTML = '⟳';
            resetBtn.onclick = () => replayParagraph(pIdx);

            controls.appendChild(playBtn);
            controls.appendChild(resetBtn);

            const textContainer = document.createElement('div');
            textContainer.className = 'para-text';

            const sentenceEls = displaySentences.map((sentText, sIdx) => {
                const span = document.createElement('span');
                span.id = `sent-${pIdx}-${sIdx}`;
                span.className = 'sentence';
                span.innerText = sentText;
                span.onclick = () => jumpToSentence(pIdx, sIdx);
                textContainer.appendChild(span);
                return span;
            });

            block.appendChild(controls);
            block.appendChild(textContainer);
            contentArea.appendChild(block);

            return { displaySentences, speechSentences, groups, sentenceEls };
        });

    } catch (error) {
        contentArea.innerHTML = '<div class="status-message error">數據載入失敗，請確認網路連線或稍後再試。</div>';
    }
}

function highlightSentence(pIdx, sIdx) {
    document.querySelectorAll('.sentence').forEach(el => el.classList.remove('current-highlight'));
    const el = paragraphs[pIdx] && paragraphs[pIdx].sentenceEls[sIdx];
    if (el) {
        el.classList.add('current-highlight');
        if (autoScroll) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
}

function findGroupIndex(pIdx, sIdx) {
    return paragraphs[pIdx].groups.findIndex(g => sIdx >= g.start && sIdx <= g.end);
}

function clearFallbackTimer() {
    if (fallbackTimer) {
        clearTimeout(fallbackTimer);
        fallbackTimer = null;
    }
}

// 核心播放函式：從指定分句開始，把「同一組」剩餘的句子合併成一個 utterance 朗讀，
// 播完後自動接續下一組；用 onboundary 事件即時判斷唸到哪一句並更新高亮，
// 若 onboundary 不觸發，則用 fallback 計時器依字數估算時間推進高亮。
function playFromSentence(pIdx, groupIdx, fromSentIdx) {
    clearFallbackTimer();

    const para = paragraphs[pIdx];
    if (!para || groupIdx >= para.groups.length) {
        moveToNextParagraph(pIdx);
        return;
    }

    const group = para.groups[groupIdx];
    const startIdx = (fromSentIdx !== undefined) ? fromSentIdx : group.start;

    highlightSentence(pIdx, startIdx);
    updatePlayButtonIcon(pIdx, '⏸');

    const speechSlice = para.speechSentences.slice(startIdx, group.end + 1);
    const text = speechSlice.join('').trim();

    if (!text) {
        playFromSentence(pIdx, groupIdx + 1);
        return;
    }

    // 計算這個 utterance 裡每一句的字元區間，供 onboundary 對應高亮用
    const offsets = [];
    let cum = 0;
    for (let i = startIdx; i <= group.end; i++) {
        const len = para.speechSentences[i].length;
        offsets.push({ idx: i, start: cum, end: cum + len });
        cum += len;
    }

    const utter = new SpeechSynthesisUtterance(text);
    const voice = getSelectedVoice();
    if (voice) {
        utter.voice = voice;
        utter.lang = voice.lang;
    }
    const rate = parseFloat(document.getElementById('speedSelect').value);
    utter.rate = rate;

    let boundaryFired = false;

    // --- fallback：依字數估算每一句的朗讀時間，逐句推進高亮 ---
    // 中文語音大約每分鐘 240~300 字，這裡取每字約 (0.26 / rate) 秒的粗估值。
    function scheduleFallback(localIdx) {
        clearFallbackTimer();
        if (localIdx >= offsets.length) return;
        const o = offsets[localIdx];
        highlightSentence(pIdx, o.idx);
        const charCount = o.end - o.start;
        const perChar = 0.26 / rate; // 秒/字
        const duration = Math.max(500, charCount * perChar * 1000);
        fallbackTimer = setTimeout(() => scheduleFallback(localIdx + 1), duration);
    }

    utter.onboundary = (e) => {
        boundaryFired = true;
        clearFallbackTimer(); // 一旦真的有 boundary 事件，就停用估算高亮
        const match = offsets.find(o => e.charIndex >= o.start && e.charIndex < o.end);
        if (match) highlightSentence(pIdx, match.idx);
    };

    utter.onstart = () => {
        // 給 onboundary 一點時間；若 600ms 內都沒觸發，判定此語音不支援，啟用 fallback
        setTimeout(() => {
            if (!boundaryFired && isSpeaking) scheduleFallback(0);
        }, 600);
    };

    utter.onend = () => {
        clearFallbackTimer();
        if (isSpeaking) playFromSentence(pIdx, groupIdx + 1);
    };
    utter.onerror = () => {
        clearFallbackTimer();
        if (isSpeaking) playFromSentence(pIdx, groupIdx + 1);
    };

    synth.speak(utter);
}

function moveToNextParagraph(finishedParaIdx) {
    updatePlayButtonIcon(finishedParaIdx, '▶');
    const nextIdx = finishedParaIdx + 1;
    if (isSpeaking && nextIdx < paragraphs.length) {
        currentParaIdx = nextIdx;
        playFromSentence(nextIdx, 0);
    } else {
        stopAll();
    }
}

function toggleParagraph(pIdx) {
    if (currentParaIdx === pIdx && isSpeaking) {
        synth.cancel();
        clearFallbackTimer();
        isSpeaking = false;
        updatePlayButtonIcon(pIdx, '▶');
        updateMasterButton();
        return;
    }
    synth.cancel();
    clearFallbackTimer();
    if (currentParaIdx !== -1) updatePlayButtonIcon(currentParaIdx, '▶');
    currentParaIdx = pIdx;
    isSpeaking = true;
    updateMasterButton();
    playFromSentence(pIdx, 0);
}

function replayParagraph(pIdx) {
    synth.cancel();
    clearFallbackTimer();
    if (currentParaIdx !== -1) updatePlayButtonIcon(currentParaIdx, '▶');
    currentParaIdx = pIdx;
    isSpeaking = true;
    updateMasterButton();
    playFromSentence(pIdx, 0);
}

function jumpToSentence(pIdx, sIdx) {
    synth.cancel();
    clearFallbackTimer();
    if (currentParaIdx !== -1) updatePlayButtonIcon(currentParaIdx, '▶');
    currentParaIdx = pIdx;
    isSpeaking = true;
    updateMasterButton();
    const gIdx = findGroupIndex(pIdx, sIdx);
    playFromSentence(pIdx, gIdx, sIdx);
}

// --- 全域播放主控：從頭（或目前位置）一路連續播放 ---
function toggleMasterPlay() {
    if (isSpeaking) {
        synth.cancel();
        clearFallbackTimer();
        isSpeaking = false;
        if (currentParaIdx !== -1) updatePlayButtonIcon(currentParaIdx, '▶');
        updateMasterButton();
    } else {
        if (paragraphs.length === 0) return;
        const startIdx = (currentParaIdx === -1) ? 0 : currentParaIdx;
        currentParaIdx = startIdx;
        isSpeaking = true;
        updateMasterButton();
        playFromSentence(startIdx, 0);
    }
}

function updateMasterButton() {
    const btn = document.getElementById('masterPlayBtn');
    if (!btn) return;
    btn.innerHTML = isSpeaking ? '⏸ 暫停' : '▶ 全部播放';
}

function updatePlayButtonIcon(pIdx, icon) {
    const btn = document.getElementById(`play-btn-${pIdx}`);
    if (btn) {
        btn.innerHTML = icon;
        if (icon === '⏸') btn.classList.add('active');
        else btn.classList.remove('active');
    }
}

function stopAll() {
    synth.cancel();
    clearFallbackTimer();
    isSpeaking = false;
    currentParaIdx = -1;
    document.querySelectorAll('.sentence').forEach(el => el.classList.remove('current-highlight'));
    document.querySelectorAll('.btn-icon').forEach(btn => {
        if (btn.innerHTML === '⏸') btn.innerHTML = '▶';
        btn.classList.remove('active');
    });
    updateMasterButton();
}

function updateSpeed() {
    if (isSpeaking && currentParaIdx !== -1) {
        // 語速變更需要重新開始當前段落的語音（Web Speech API 不支援朗讀中途調速）
        const pIdx = currentParaIdx;
        synth.cancel();
        clearFallbackTimer();
        playFromSentence(pIdx, 0);
    }
}

function toggleAutoScroll() {
    autoScroll = !autoScroll;
    const bar = document.getElementById('scrollToggle');
    if (autoScroll) {
        bar.classList.add('active');
        bar.querySelector('.sidebar-text').innerText = "自動捲軸開啟";
    } else {
        bar.classList.remove('active');
        bar.querySelector('.sidebar-text').innerText = "自動捲軸關閉";
    }
}

// 語音清單通常是非同步載入的，onvoiceschanged 觸發時再填一次
populateVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = populateVoices;
}

loadMeetingData();
</script>

</body>
</html>
